<!DOCTYPE html>

</head>
<body>
<div class="wrapper">
  <div class="card">
    <h1 class="title2">Buat akun baru anda!</h1>

    
          <div class="wrapinner">

            <input class="input" type="text" id="nama" name="nama" required placeholder="Nama anda">

            <h1 class="title1">E-Mail</h1>
            <input class="input" type="text" id="email" required placeholder="Masukkan email anda">

            <h1 class="title1">Password</h1>
            <input class="input" type="text" id="password" required placeholder="Min. 8 karakter">

            <h1 class="title1">Konfirmasi Password</h1>
            <input class="input" type="text" id="password" required placeholder="Ulangi password">
          </div>

        <div class="tombol">Buat Akun</div>

        <p class="login-text"> Sudah punya akun?
            <a href="">Masuk di sini</a>
        </p>

  </div>
</div>

</html>
